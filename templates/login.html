<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h3 {
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }
        .login-icon {
            font-size: 50px;
            margin-bottom: 15px;
            color: #2a5298;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
        }
        .btn-login {
            background: #2a5298;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #1e3c72;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-icon">🔒</div>
        <h3>System Access</h3>
        <p class="text-muted mb-4">กรุณากรอกรหัสผ่านเพื่อเข้าสู่ระบบควบคุม</p>
        
        {% if error %}
        <div class="alert alert-danger p-2" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-4">
                <input type="password" class="form-control text-center fs-5" name="password" placeholder="Enter Password" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-login">เข้าสู่ระบบ</button>
        </form>
    </div>

</body>
</html>
